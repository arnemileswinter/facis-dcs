{{- if .Values.keys.seed.enabled }}
{{- if not .Values.keys.seed.jwk }}
{{- fail "hydra.keys.seed.enabled=true requires hydra.keys.seed.jwk" }}
{{- end }}
{{- $sets := .Values.keys.seed.sets | default (list "hydra.jwt.access-token") -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-hydra-key-seed
  labels:
    app.kubernetes.io/name: hydra
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hydra
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: key-seed
          image: "{{ .Values.keys.seed.image.repository }}:{{ .Values.keys.seed.image.tag }}"
          imagePullPolicy: {{ .Values.keys.seed.image.pullPolicy }}
          env:
            - name: HYDRA_ADMIN_URL
              value: {{ printf "http://%s-hydra:%d" .Release.Name (.Values.service.adminPort | int) | quote }}
            - name: KEY_SETS
              value: {{ join " " $sets | quote }}
            - name: JWK_PAYLOAD
              value: {{ printf "{\"keys\":[%s]}" (toJson .Values.keys.seed.jwk) | quote }}
          command: ["sh", "-ec"]
          args:
            - |
              set -e
              until curl -fsS "$HYDRA_ADMIN_URL/health/ready" >/dev/null; do
                sleep 2
              done

              for set_name in $KEY_SETS; do
                curl -fsS \
                  -X PUT "$HYDRA_ADMIN_URL/admin/keys/$set_name" \
                  -H "Content-Type: application/json" \
                  --data "$JWK_PAYLOAD" >/dev/null
              done
{{- end }}
