{{- if .Values.vault.enabled }}
{{/*
Vault init job – runs after every install/upgrade.
  1. Waits for Vault to be ready.
  2. Enables KV v2 at secret/ if not already mounted.
  3. Generates a signing key on first run; subsequent runs re-use the stored value.
  4. Writes the key to the `signing` Kubernetes secret via the k8s API.

This replaces the static Helm-generated signing secret when Vault is enabled.
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-vault-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-vault-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-vault-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-vault-init
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-vault-init
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-vault-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-vault-init
      restartPolicy: OnFailure
      containers:
        - name: vault-init
          image: alpine:3.19
          env:
            - name: VAULT_ADDR
              value: http://{{ .Release.Name }}-vault:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault
                  key: token
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache curl jq openssl >/dev/null 2>&1

              K8S=https://kubernetes.default.svc
              K8S_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              K8S_CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)

              # ---- Wait for Vault ----------------------------------------
              echo "Waiting for Vault at $VAULT_ADDR..."
              until curl -sf $VAULT_ADDR/v1/sys/health >/dev/null; do sleep 2; done
              echo "Vault ready."

              # ---- Enable KV v2 (idempotent) -----------------------------
              curl -sf -X POST \
                -H "X-Vault-Token: $VAULT_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"type":"kv","options":{"version":"2"}}' \
                $VAULT_ADDR/v1/sys/mounts/secret >/dev/null 2>&1 || true

              # ---- Enable transit mounts and signer keys (idempotent) ------
              # Signer resolves keys as /<namespace>/<group>/sign/<key> when group is set,
              # so we provision both plain and group-scoped mounts used by OCM-W.
              # Vault refuses nested transit mounts (tenant_space and tenant_space/dcs
              # cannot coexist), so swallow the resulting "unsupported path" errors
              # rather than aborting the whole post-install hook.
              for MOUNT in transit tenant_space tenant_space/dcs; do
                MOUNT_API=${MOUNT//\//%2F}
                curl -sf -X POST \
                  -H "X-Vault-Token: $VAULT_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d '{"type":"transit"}' \
                  "$VAULT_ADDR/v1/sys/mounts/$MOUNT_API" >/dev/null 2>&1 || true

                KEY_TYPE=$(curl -sf \
                  -H "X-Vault-Token: $VAULT_TOKEN" \
                  "$VAULT_ADDR/v1/$MOUNT/keys/signerkey" \
                  | jq -r '.data.type // empty' 2>/dev/null || true)

                if [ -z "$KEY_TYPE" ]; then
                  if curl -sf -X POST \
                    -H "X-Vault-Token: $VAULT_TOKEN" \
                    -H "Content-Type: application/json" \
                    -d '{"type":"ecdsa-p256"}' \
                    "$VAULT_ADDR/v1/$MOUNT/keys/signerkey" >/dev/null; then
                    echo "Created $MOUNT signer key signerkey (ecdsa-p256)."
                  else
                    echo "Skipping $MOUNT signer key signerkey: mount unavailable (nested transit mounts are unsupported)."
                  fi
                elif [ "$KEY_TYPE" != "ecdsa-p256" ]; then
                  echo "$MOUNT signer key signerkey exists with type $KEY_TYPE; signer token signing may fail."
                else
                  echo "$MOUNT signer key signerkey already present (ecdsa-p256)."
                fi
              done

              # ---- Get or generate signing key ---------------------------
              EXISTING=$(curl -sf \
                -H "X-Vault-Token: $VAULT_TOKEN" \
                $VAULT_ADDR/v1/secret/data/signing-key \
                | jq -r '.data.data.value // empty' 2>/dev/null || true)

              USE_EXISTING=false
              KEY_PEM=""

              if [ -n "$EXISTING" ]; then
                # Handle raw PEM stored in Vault
                if printf '%s' "$EXISTING" | grep -q "BEGIN .*PRIVATE KEY"; then
                  KEY_PEM="$EXISTING"
                else
                  # Legacy format: base64-encoded PEM stored in Vault
                  LEGACY_DECODED=$(printf '%s' "$EXISTING" | base64 -d 2>/dev/null || true)
                  if printf '%s' "$LEGACY_DECODED" | grep -q "BEGIN .*PRIVATE KEY"; then
                    KEY_PEM="$LEGACY_DECODED"
                    echo "Legacy signing key encoding detected - normalizing format..."
                  fi
                fi
              fi

              # CV currently has a parsing bug in idSigning.decodeKey:
              # it requires block type "EC PRIVATE KEY" but parses bytes with ParsePKCS8PrivateKey.
              # To stay compatible, we normalize to PKCS8 bytes wrapped in EC PRIVATE KEY headers.
              if [ -n "$KEY_PEM" ] && printf '%s' "$KEY_PEM" | openssl pkey -noout >/dev/null 2>&1; then
                KEY_PEM_PKCS8=$(printf '%s' "$KEY_PEM" | openssl pkcs8 -topk8 -nocrypt 2>/dev/null)
                USE_EXISTING=true
                echo "Signing key retrieved from Vault."
              else
                echo "Generating new EC signing key..."
                KEY_PEM_PKCS8=$(openssl genpkey -algorithm EC -pkeyopt ec_paramgen_curve:prime256v1 2>/dev/null)
              fi

              KEY_PEM=$(printf '%s' "$KEY_PEM_PKCS8" | sed 's/BEGIN PRIVATE KEY/BEGIN EC PRIVATE KEY/; s/END PRIVATE KEY/END EC PRIVATE KEY/')

              # Persist raw PEM in Vault for future reuse.
              curl -sf -X POST \
                -H "X-Vault-Token: $VAULT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$(jq -nc --arg v "$KEY_PEM" '{data:{value:$v}}')" \
                $VAULT_ADDR/v1/secret/data/signing-key >/dev/null
              echo "Signing key stored in Vault at secret/signing-key."

              # ---- Sync to Kubernetes secret -----------------------------
              # CV receives the secret value as a plain env var (k8s decodes base64 once),
              # so store base64(raw PEM) — CV gets the raw PEM directly.
              B64=$(printf '%s' "$KEY_PEM" | base64 | tr -d '\n')
              BODY="{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"signing\",\"namespace\":\"$NS\"},\"type\":\"Opaque\",\"data\":{\"signing-key\":\"$B64\"}}"

              # Try PUT (update) first, fall back to POST (create)
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                -H "Authorization: Bearer $K8S_TOKEN" \
                -H "Content-Type: application/json" \
                --cacert $K8S_CA \
                $K8S/api/v1/namespaces/$NS/secrets/signing \
                -d "$BODY")

              if [ "$STATUS" = "404" ]; then
                curl -sf -X POST \
                  -H "Authorization: Bearer $K8S_TOKEN" \
                  -H "Content-Type: application/json" \
                  --cacert $K8S_CA \
                  $K8S/api/v1/namespaces/$NS/secrets \
                  -d "$BODY" >/dev/null
              fi

              echo "Kubernetes secret 'signing' is up to date."
{{- end }}
