{{/*
Self-contained secret generation for OCM-W stack.

Uses Helm's lookup function: existing secrets are preserved on upgrade
(values never rotate), new secrets are created on first install.
No manual kubectl create secret steps needed.
*/}}

{{- $ns := .Release.Namespace }}

{{/* ---- PostgreSQL credentials (shared by well-known and status-list) -- */}}
{{- $pgUser     := .Values.secrets.postgresql.username | default "dcs" }}
{{- $pgPassword := .Values.secrets.postgresql.password | default "dcs" }}

{{- $wkExisting := lookup "v1" "Secret" $ns "wellknown-db-secret" }}
{{- if $wkExisting }}
  {{- $pgPassword = index $wkExisting.data "postgresql-password" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: wellknown-db-secret
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  postgresql-password: {{ $pgPassword | b64enc }}
---
{{- $slExisting := lookup "v1" "Secret" $ns "statuslist-db-secret" }}
{{- $slUser     := $pgUser }}
{{- $slPassword := $pgPassword }}
{{- if $slExisting }}
  {{- $slUser     = index $slExisting.data "postgresql-username" | b64dec }}
  {{- $slPassword = index $slExisting.data "postgresql-password" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: statuslist-db-secret
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  postgresql-username: {{ $slUser     | b64enc }}
  postgresql-password: {{ $slPassword | b64enc }}
---
{{/* ---- Vault token (mirrors vault.server.dev.devRootToken) ------------ */}}
{{- $vaultToken    := dig "server" "dev" "devRootToken" "root" .Values.vault }}
{{- $vaultExisting := lookup "v1" "Secret" $ns "vault" }}
{{- if $vaultExisting }}
  {{- $vaultToken = index $vaultExisting.data "token" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: vault
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  token: {{ $vaultToken | b64enc }}
---
{{/* ---- Signing key ----------------------------------------------------
     Managed by the vault-init Job when vault.enabled = true.
     Falls back to a Helm-generated random value when Vault is disabled.
*/}}
{{- if not .Values.vault.enabled }}
{{- $signingKey      := .Values.secrets.signingKey | default (randAlphaNum 32) }}
{{- $signingExisting := lookup "v1" "Secret" $ns "signing" }}
{{- if $signingExisting }}
  {{- $signingKey = index $signingExisting.data "signing-key" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: signing
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  signing-key: {{ $signingKey | b64enc }}
---
{{- end }}
{{/* ---- Cassandra credentials ----------------------------------------- */}}
{{- $cassandraPassword  := dig "dbUser" "password" "cassandra" .Values.cassandra }}
{{- $cassandraExisting  := lookup "v1" "Secret" $ns "cassandra" }}
{{- if $cassandraExisting }}
  {{- $cassandraPassword = index $cassandraExisting.data "cassandra-password" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: cassandra
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  cassandra-password: {{ $cassandraPassword | b64enc }}
---
{{/* ---- Redis credentials ({release}-redis expected by pre-auth bridge) */}}
{{- $redisSecretName  := printf "%s-redis" .Release.Name }}
{{- $redisPassword    := .Values.secrets.redis.password | default "" }}
{{- $redisExisting    := lookup "v1" "Secret" $ns $redisSecretName }}
{{- if $redisExisting }}
  {{- $redisPassword = index $redisExisting.data "redis-password" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $redisSecretName }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  redis-password: {{ $redisPassword | b64enc }}
