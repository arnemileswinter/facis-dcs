apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-cassandra
spec:
  replicas: 1
  # With a PVC of accessMode ReadWriteOnce, two pods cannot mount the
  # volume simultaneously. Force Recreate so the old pod is fully gone
  # before the new one starts and tries to attach.
  {{- if .Values.persistence.enabled }}
  strategy:
    type: Recreate
    rollingUpdate: null
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: cassandra
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cassandra
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.persistence.enabled }}
      securityContext:
        fsGroup: 999
      {{- end }}
      containers:
        - name: cassandra
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: cql
              containerPort: {{ .Values.service.port }}
          env:
            - name: CASSANDRA_USER
              value: {{ .Values.dbUser.user | quote }}
            - name: CASSANDRA_PASSWORD
              value: {{ .Values.dbUser.password | quote }}
            - name: CASSANDRA_AUTHENTICATOR
              value: PasswordAuthenticator
            - name: CASSANDRA_AUTHORIZER
              value: CassandraAuthorizer
            - name: MAX_HEAP_SIZE
              value: "512M"
            - name: HEAP_NEWSIZE
              value: "128M"
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/cassandra
          {{- end }}
          readinessProbe:
            exec:
              command: ["cqlsh", "-u", {{ .Values.dbUser.user | quote }}, "-p", {{ .Values.dbUser.password | quote }}, "-e", "describe keyspaces"]
            initialDelaySeconds: 30
            periodSeconds: 10
            # cqlsh is a Python CLI; cold-start regularly exceeds the k8s
            # default 1s timeout on shared dev clusters, so the probe never
            # passes. Give it room to actually run.
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-cassandra-data" .Release.Name) }}
      {{- end }}
