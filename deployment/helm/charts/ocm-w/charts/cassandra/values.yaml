image:
  repository: cassandra
  tag: "4.1"
  pullPolicy: IfNotPresent

service:
  port: 9042

dbUser:
  user: cassandra
  password: cassandra

persistence:
  enabled: false
  # Empty string => use the cluster default StorageClass.
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 8Gi
  # Optional: pin to an existing PVC instead of templating a new one.
  existingClaim: ""

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi
