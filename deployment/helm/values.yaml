replicaCount: 1

image:
  repository: "[registry]"
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

dockerRegistry:
  create: false
  secretName: "docker-registry"
  server: ""
  username: ""
  password: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8991

ingress:
  enabled: false
  className: ""
  annotations: {}
  pathType: Prefix
  hosts: []
  tls: []

# Istio VirtualService (optional)
istio:
  enabled: false
  hosts: []
  gateways: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

customCA:
  enabled: false
  configMapName: ""

hostAliases: []
nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraEnvFrom: []

# Route and path configuration
route:
  basePath: "/digital-contracting-service"

# Override individual paths (derived from route.basePath if not set)
paths:
  api: ""
  ui: ""

# OIDC / authentication
# Set issuerURL explicitly for external providers such as Hydra.
# It can be auto-derived from the Hydra route when the bundled Hydra chart is enabled.
oidc:
  issuerURL: ""
  clientID: "[oidc-client-id]"
  redirectURI: "[oidc-redirect-uri]"
  logoutRedirectURI: "[oidc-logout-redirect-uri]"
  scheme: "https"
  issuerURLSecretRef:
    name: ""
    key: "OIDC_ISSUER_URL"

# Database connection – derived from the postgresql sub-chart when not set explicitly
database:
  url: ""
  port: 5432
  user: ""
  password: ""
  name: ""
  sslmode: "disable"
  secretRef:
    name: ""
    key: "DATABASE_URL"

# NATS connection – derived from the nats sub-chart when not set explicitly
messaging:
  natsURL: ""
  natsPort: 4222
  secretRef:
    name: ""
    key: "NATS_URL"

# Service discovery overrides – all auto-wired when the sub-charts below are enabled
serviceDiscovery:
  postgresqlHost: ""
  hydraHost: ""
  natsHost: ""
  hydraPublicPort: ""

# ---- Co-deployed dependencies ----------------------------------------
# Each sub-chart owns its full set of configurable values.
# Only fields referenced by the parent chart's helpers are listed here.
# All other sub-chart options (images, resources, persistence, etc.) can
# be set directly in your values override file.

postgresql:
  enabled: false
  auth:
    username: dcs
    password: dcs
    database: dcs

hydra:
  enabled: false
  service:
    publicPort: 4444
    adminPort: 4445
  route:
    path: ""
  config:
    # Set these when deploying Hydra for browser-based flows.
    # loginURL and consentURL should point to your Node-RED consent bridge flow endpoints.
    dsn: "memory"
    selfIssuerURL: ""
    loginURL: ""
    consentURL: ""
  secrets:
    system: ""

nats:
  enabled: false

neo4j:
  enabled: false

# XFSC Organisation Credential Manager W-Stack (OID4VC-based, non-Indy)
# Provides the wallet-facing OpenID4VC services used for issuance and presentation.
# In the target architecture, these services back the Hydra login/consent flow so
# wallet authentication can be translated into a standard OIDC session for DCS.
# See charts/ocm-w/values.yaml for all configurable fields.
ocmW:
  enabled: false
  # URL the DCS backend uses to reach the OCM-W issuer API.
  # Auto-derived from the sub-chart when enabled, or set explicitly here.
  issuerURL: ""
  secretRef:
    name: ""
    key: "OCM_W_ISSUER_URL"

# XFSC Federated Catalogue (requires neo4j, an OIDC-compatible issuer, postgresql with "fc" database)
# See charts/federated-catalogue/values.yaml for all configurable fields.
federatedCatalogue:
  enabled: false
  # URL the DCS backend uses to reach the Federated Catalogue API
  apiURL: ""
  secretRef:
    name: ""
    key: "FEDERATED_CATALOGUE_API_URL"
