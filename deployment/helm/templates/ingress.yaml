{{- if and .Values.app.enabled .Values.ingress.enabled -}}
{{- if eq (len .Values.ingress.hosts) 0 -}}
{{- fail "ingress.enabled=true requires at least one entry in ingress.hosts" -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- if .paths }}
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ default $.Values.ingress.pathType .pathType }}
            backend:
              service:
                name: {{ include "digital-contracting-service.fullname" $ }}
                port:
                  number: {{ $.Values.service.port | int }}
          {{- end }}
          {{- else }}
          - path: {{ include "digital-contracting-service.baseRoutePath" $ }}
            pathType: {{ default "Prefix" $.Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "digital-contracting-service.fullname" $ }}
                port:
                  number: {{ $.Values.service.port | int }}
          {{- end }}
          {{- if and $.Values.hydra.enabled $.Values.hydra.route.path }}
          - path: {{ include "digital-contracting-service.hydraRoutePath" $ }}
            pathType: {{ default "Prefix" $.Values.ingress.pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}-hydra
                port:
                  number: {{ $.Values.hydra.service.publicPort | int }}
          {{- end }}
    {{- end }}
{{- end }}