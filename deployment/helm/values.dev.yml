# Dev values: co-deploy all dependencies, skip the DCS app itself.
# Run the backend locally with `air` and the frontend with `vite`.
#
# Install:
#   helm install dcs ./deployment/helm -f ./deployment/helm/values.dev.yml
#
# Upgrade (after chart changes):
#   helm upgrade dcs ./deployment/helm -f ./deployment/helm/values.dev.yml
#
# Services exposed on localhost via NodePort (Rancher Desktop forwards these automatically):
# The dev stack uses Hydra as OIDC provider. Login/consent endpoints must be
# provided by your Node-RED consent bridge flow.
#   PostgreSQL        : localhost:30432
#   Hydra public      : localhost:30080
#   Hydra admin       : localhost:30085
#   NATS              : localhost:30422
#   Neo4j HTTP        : localhost:30474
#   Neo4j Bolt        : localhost:30687
#   OCM-W issuer      : localhost:30180
#   OCM-W well-known  : localhost:30182
#
# No manual secret setup needed – all OCM-W secrets are generated by the chart.

# In development, don't deploy the DCS container since we run it locally
replicaCount: 0

# No private registry needed for local dev (all dep images are public)
imagePullSecrets: []
dockerRegistry:
  create: false

postgresql:
  enabled: true
  auth:
    username: dcs
    password: dcs
    database: dcs
  additionalDatabases: ["fc", "wellknown", "status"]
  persistence:
    enabled: false
  service:
    type: NodePort
    nodePort: 30432

hydra:
  enabled: true
  service:
    type: NodePort
    publicPort: 4444
    adminPort: 4445
    publicNodePort: 30080
    adminNodePort: 30085
  route:
    path: "/hydra"
  config:
    dsn: "memory"
    selfIssuerURL: "http://localhost:30080"
    loginURL: "http://localhost:1880/hydra/login"
    consentURL: "http://localhost:1880/hydra/consent"
  secrets:
    system: "dev-hydra-system-secret-change-me"

nats:
  enabled: true
  service:
    type: NodePort
    nodePort: 30422

neo4j:
  enabled: true
  persistence:
    enabled: false
  service:
    type: NodePort
    nodePortHttp: 30474
    nodePortBolt: 30687

ocmW:
  enabled: true

  issuance-service:
    service:
      type: NodePort
      nodePort: 30180
    config:
      nats:
        url: nats://dcs-nats:4222
      didResolver: ""   # deploy universal-resolver separately when needed
      jwksUrl: http://localhost:30182/.well-known/jwks.json
      audience: http://localhost:30180

  well-known-service:
    enabled: true
    service:
      type: NodePort
      nodePort: 30182
    config:
      nats:
        url: dcs-nats:4222
      postgres:
        host: dcs-postgresql
        user: dcs
        password:
          name: wellknown-db-secret
          key: postgresql-password
      issuer: localhost:30180

  credential-verification-service:
    enabled: true
    config:
      messaging:
        nats:
          url: dcs-nats:4222
      cassandra:
        cassandraHosts: dcs-cassandra
        cassandraUser: cassandra
      signerService:
        presentationVerifyUrl: http://dcs-signer:8080/v1/presentation/verify
        presentationSignUrl: http://dcs-signer:8080/v1/presentation/proof

  status-list-service:
    enabled: true
    # Workaround: upstream chart renders requests/limits directly on the container
    # (invalid schema). Nulling them out prevents the Kubernetes validation error.
    resources: null
    requests: null
    limits: null
    config:
      messaging:
        nats:
          url: nats://dcs-nats:4222
      database:
        host: dcs-postgresql
        secretName: statuslist-db-secret

  pre-authorization-bridge:
    enabled: true
    config:
      nats:
        url: dcs-nats:4222
      database:
        hosts: dcs-redis-master:6379
      oAuth:
        signerJwksUrl: http://dcs-signer:8080/v1/jwks
        credentialEndpoint: http://dcs-signer:8080/v1/credential

  sd-jwt-service:
    enabled: true
    config:
      signUrl: http://dcs-signer:8080/v1/sign

  signer:
    enabled: true
    signer:
      nats:
        natsHost: nats://dcs-nats:4222
      sdjwt:
        url: http://dcs-sd-jwt-service:8080/v1/sign
      engine:
        env:
          VAULT_ADRESS: http://dcs-vault:8200
        secretEnv:
          VAULT_TOKEN:
            name: vault
            key: token
    secretEnv:
      VAULT_TOKEN:
        name: vault
        key: token

  vault:
    enabled: true
    injector:
      enabled: false   # not needed for dev, avoids webhook conflicts
    server:
      dev:
        enabled: true
        devRootToken: root

  redis:
    enabled: true

  cassandra:
    enabled: true

federatedCatalogue:
  enabled: false

# OIDC / route values below are not used when replicaCount=0,
# but kept here as documentation for the current backend .env.dev file.
oidc:
  issuerURL: "http://localhost:30080"
  clientID: "dcs-client"
  redirectURI: "http://localhost:5173/api/auth/callback"
  logoutRedirectURI: "http://localhost:5173/api/auth/logout-complete"
  scheme: "http"

route:
  basePath: "/api"
