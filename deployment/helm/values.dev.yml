# Dev values: co-deploy all dependencies, skip the DCS app itself.
# Run the backend locally with `air` and the frontend with `vite`.
#
# Install:
#   helm install dcs ./deployment/helm -f ./deployment/helm/values.dev.yml
#
# Upgrade (after chart changes):
#   helm upgrade dcs ./deployment/helm -f ./deployment/helm/values.dev.yml
#
# Services exposed on localhost via NodePort (Rancher Desktop forwards these automatically):
# The dev stack uses Hydra as OIDC provider. Login/consent endpoints are served
# by the local DCS backend and reached via the Vite gateway.
#   PostgreSQL        : localhost:30432
#   Hydra public      : localhost:30080
#   Hydra admin       : localhost:30085
#   NATS              : localhost:30422
#   Neo4j HTTP        : localhost:30474
#   Neo4j Bolt        : localhost:30687
#   OCM-W issuer      : localhost:30180
#   OCM-W well-known  : localhost:30182
#
# No manual secret setup needed – all OCM-W secrets are generated by the chart.

# In development, don't deploy the DCS container since we run it locally.
app:
  enabled: false

replicaCount: 0

# No private registry needed for local dev (all dep images are public)
imagePullSecrets: []
dockerRegistry:
  create: false

postgresql:
  enabled: true
  auth:
    username: dcs
    password: dcs
    database: dcs
  additionalDatabases: ["fc", "wellknown", "status", "hydra"]
  persistence:
    enabled: false
  service:
    type: NodePort
    nodePort: 30432

hydra:
  enabled: true
  service:
    type: NodePort
    publicPort: 4444
    adminPort: 4445
    publicNodePort: 30080
    adminNodePort: 30085
  route:
    path: "/hydra"
  config:
    dsn: "postgres://dcs:dcs@dcs-postgresql:5432/hydra?sslmode=disable"
    dev: true
    selfIssuerURL: "http://localhost:5173"
    loginURL: "http://localhost:5173/ui/"
    consentURL: "http://localhost:5173/ui/"
    logoutURL: "http://localhost:5173/api/auth/logout-complete"
  secrets:
    system: "dev-hydra-system-secret-change-me"
  clients:
    - client_id: dcs-client
      client_secret: dcs-secret
      grant_types: ["authorization_code", "refresh_token"]
      response_types: ["code"]
      scope: "openid offline_access"
      redirect_uris: ["http://localhost:5173/api/auth/callback"]
      post_logout_redirect_uris: ["http://localhost:5173/api/auth/logout-complete"]
      token_endpoint_auth_method: client_secret_post
      skip_consent: true

nats:
  enabled: true
  service:
    type: NodePort
    nodePort: 30422

neo4j:
  enabled: true
  persistence:
    enabled: false
  service:
    type: NodePort
    nodePortHttp: 30474
    nodePortBolt: 30687

ocmW:
  enabled: true
  # Public URL handed to wallets for OID4VCI endpoints in local development.
  # We route this via the frontend Vite proxy.
  publicIssuerURL: "http://localhost:5173"

  issuance-service:
    service:
      type: NodePort
      nodePort: 30180
    config:
      nats:
        url: nats://dcs-nats:4222
      didResolver: ""   # deploy universal-resolver separately when needed
      jwksUrl: http://pre-authorization-bridge-service:8080/.well-known/jwks.json
      audience: http://localhost:5173/v1/tenants/tenant_space/credential

  well-known-service:
    enabled: true
    service:
      type: NodePort
      nodePort: 30182
    config:
      nats:
        url: dcs-nats:4222
      postgres:
        host: dcs-postgresql
        user: dcs
        password:
          name: wellknown-db-secret
          key: postgresql-password
      issuer: http://localhost:5173

  credential-verification-service:
    enabled: true
    service:
      type: NodePort
      nodePort: 32035
    image:
      pullSecrets: key
    config:
      externalPresentation:
        # Upstream CV chart template reads the misspelled key `enbaled`.
        # Keep this exact key and quote style so the rendered env value stays a string.
        enbaled: '"true"'
        authorizeEndpoint: credential-verification-service.default.svc.cluster.local:8080/v1/tenants/tenant_space/presentation/
        # NOTE: The upstream chart (credential-verification-service-1.0.2) renders
        # this value into env var CREDENTIALVERIFICATION_CLIENTURLSCHEMA, but the
        # CV service binary actually reads CREDENTIALVERIFICATION_EXTERNALPRESENTATION_CLIENTURLSCHEMA
        # (nested under the ExternalPresentation envconfig group). The chart key
        # below is therefore ignored by the running service. After helm install,
        # apply the override manually:
        #   kubectl -n default set env deploy/credential-verification-service \
        #     CREDENTIALVERIFICATION_EXTERNALPRESENTATION_CLIENTURLSCHEMA=http
        # In local dev the wallet reaches CV through the Vite proxy on
        # http://localhost:5173 (no TLS). CV builds the JWT response_uri as
        #   <clientUrlSchema>://<incoming Host header>/<publicBasePath>/<id>
        # The backend overrides the Host header on its CV call (see
        # PRESENTATION_PUBLIC_HOST in backend/internal/service/auth.go) and Vite
        # proxies /api/presentation/proof/ to the CV NodePort.
        clientUrlSchema: http
        requestObjectPolicy: ""
        clientIdPolicy: ""
      messaging:
        nats:
          url: dcs-nats:4222
      cassandra:
        cassandraHosts: dcs-cassandra
        cassandraUser: cassandra
      signerService:
        signerTopic: sign
        presentationVerifyUrl: http://dcs-signer:8080/v1/presentation/verify
        presentationSignUrl: http://dcs-signer:8080/v1/presentation/proof

  status-list-service:
    enabled: true
    # Workaround: upstream chart renders requests/limits directly on the container
    # (invalid schema). Nulling them out prevents the Kubernetes validation error.
    resources: null
    requests: null
    limits: null
    config:
      messaging:
        nats:
          url: nats://dcs-nats:4222
      database:
        host: dcs-postgresql
        secretName: statuslist-db-secret

  pre-authorization-bridge:
    enabled: true
    service:
      type: NodePort
      port: 8080
      nodePort: 31803
    config:
      nats:
        # Bridge's cloudeventprovider connect requires the nats:// scheme
        # (without it, it dials the wrong port/IP and times out).
        url: nats://dcs-nats:4222
      database:
        hosts: dcs-redis-master:6379
      oAuth:
        signerTopic: sign
        signerJwksUrl: http://dcs-signer:8080/v1/jwks
        credentialEndpoint: http://localhost:5173/v1/tenants/tenant_space/credential
        namespace: transit
        issuerKid: signerkey

  sd-jwt-service:
    enabled: true
    config:
      signUrl: http://dcs-signer:8080/v1/sign

  signer:
    enabled: true
    image:
      tag: v2.1.0
    service:
      type: NodePort
      port: 8080
      nodePort: 30190
    signer:
      nats:
        natsHost: nats://dcs-nats:4222
        topic: sign
      sdjwt:
        url: http://dcs-sd-jwt-service:8080/v1/sign
      engine:
        env:
          VAULT_ADRESS: http://dcs-vault:8200
        secretEnv:
          VAULT_TOKEN:
            name: vault
            key: token
    secretEnv:
      VAULT_TOKEN:
        name: vault
        key: token

  vault:
    enabled: true
    injector:
      enabled: false   # not needed for dev, avoids webhook conflicts
    server:
      dev:
        enabled: true
        devRootToken: root

  redis:
    enabled: true

  cassandra:
    enabled: true
    persistence:
      enabled: true
      size: 8Gi

federatedCatalogue:
  enabled: false

credentialVerification:
  url: http://localhost:32035

oidc:
  issuerURL: "http://localhost:30080"
  clientID: "dcs-client"
  clientSecret: "dcs-secret"
  redirectURI: "http://localhost:5173/api/auth/callback"
  logoutRedirectURI: "http://localhost:5173/api/auth/logout-complete"
  scheme: "http"

route:
  basePath: "/api"
